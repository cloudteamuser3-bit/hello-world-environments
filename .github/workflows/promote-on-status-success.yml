name: Promote on successful deploy

# Triggered by a plain push to status/*.json - infra repo writes that file
# via a normal git commit+push (see infra repo's scripts/report_status.sh),
# NOT a platform-specific dispatch API. This means the trigger here is a
# completely ordinary path-filtered push trigger, which exists in nearly
# identical form on every major CI platform (GitHub Actions `paths:`,
# GitLab CI `rules: changes:`, etc.) - nothing to port here at all.
on:
  push:
    branches: [main]
    paths:
      - "status/dev.json"
      - "status/staging.json"

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - run: pip install --quiet pyyaml

      - name: Detect which status file changed
        id: detect
        run: echo "environment=$(./scripts/detect_status_change.sh)" >> "$GITHUB_OUTPUT"

      - name: Read status
        id: status
        if: steps.detect.outputs.environment != ''
        run: python3 scripts/read_status.py "status/${{ steps.detect.outputs.environment }}.json" >> "$GITHUB_OUTPUT"

      - name: Determine target environment
        id: target
        if: steps.detect.outputs.environment != '' && steps.status.outputs.RESULT == 'success'
        run: |
          if [ "${{ steps.detect.outputs.environment }}" = "dev" ]; then
            echo "target=staging" >> "$GITHUB_OUTPUT"
            echo "branch=promote/dev-to-staging" >> "$GITHUB_OUTPUT"
          else
            echo "target=prod" >> "$GITHUB_OUTPUT"
            echo "branch=promote/staging-to-prod" >> "$GITHUB_OUTPUT"
          fi

      - name: Read previous tag for target
        id: previous
        if: steps.target.outputs.target != ''
        run: echo "previous_tag=$(python3 scripts/read_env_tag.py environments/${{ steps.target.outputs.target }}.yaml)" >> "$GITHUB_OUTPUT"

      - name: Update target environment file
        if: steps.target.outputs.target != ''
        run: |
          ./scripts/update_environment_file.sh \
            "${{ steps.target.outputs.target }}" \
            "${{ steps.status.outputs.IMAGE_TAG }}" \
            "${{ steps.status.outputs.IMAGE_DIGEST }}" \
            "${{ steps.detect.outputs.environment }} (verified healthy)"

      - name: Build promotion report
        if: steps.target.outputs.target != ''
        run: |
          ./scripts/build_promotion_report.sh \
            "${{ steps.detect.outputs.environment }}" \
            "${{ steps.target.outputs.target }}" \
            "${{ steps.status.outputs.IMAGE_TAG }}" \
            "${{ steps.status.outputs.IMAGE_DIGEST }}" \
            "${{ steps.previous.outputs.previous_tag }}" \
            pr_body.md

      - name: Open or update promotion PR
        if: steps.target.outputs.target != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "promotion-bot"
          git config user.email "promotion-bot@users.noreply.github.com"
          ./scripts/open_promotion_pr.sh \
            "${{ steps.target.outputs.branch }}" \
            "Promote ${{ steps.status.outputs.IMAGE_TAG }} to ${{ steps.target.outputs.target }}" \
            pr_body.md \
            "promotion,${{ steps.target.outputs.target }}"
